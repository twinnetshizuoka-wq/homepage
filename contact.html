      <a href="index.html" class="logo">twin net</a>

      <nav class="main-nav">

      </nav>
    </div>
  </header>

  <main>
    <section class="page-hero">
      <div class="container"><h1>お問い合わせ</h1></div>
    </section>
    <section class="page-content">
      <div class="container content-narrow">
        <p>アプリの機能の質問、ご指摘やアドバイスがありましたら、以下のフォームよりお問い合わせください。</p>

        <form class="contact-form" id="contact-form">
          <div class="form-group">
            <label for="name">お名前 <span class="required">*</span></label>
            <input type="text" id="name" name="name" required>
          </div>
          <div class="form-group">
            <label for="email">メールアドレス <span class="required">*</span></label>
            <input type="email" id="email" name="email" required>
          </div>
          <div class="form-group">
            <label for="subject">件名</label>
            <select id="subject" name="subject">
              <option value="consulting">コンサルティングについて</option>
              <option value="app">アプリについて</option>
              <option value="recording">自動録音アプリについて</option>
              <option value="other">その他</option>
            </select>
          </div>
          <div class="form-group">
            <label for="message">メッセージ <span class="required">*</span></label>
            <textarea id="message" name="message" rows="6" required></textarea>
          </div>
          <button type="submit" class="btn btn-primary btn-block">送信する</button>
        </form>

        <div class="form-success" id="form-success" hidden>
          <p>お問い合わせありがとうございます。内容を確認のうえ、ご連絡いたします。</p>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <div class="footer-brand">

        <ul><li>光回線の紹介販売業務</li><li>アプリ開発業務</li></ul>
      </div>
      <div class="footer-links">
        <a href="privacy.html">プライバシーポリシー</a>
        <a href="contact.html">お問い合わせ</a>
      </div>
    </div>
    <div class="footer-bottom"><div class="container"><p>&copy; 2026 twin net. All rights reserved.</p></div></div>
  </footer>
